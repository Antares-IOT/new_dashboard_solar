{% extends "base.html" %}

{% block content %}
<div class="card mb-4">
    <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
        <h5 class="card-title mb-0">Geofence Management</h5>
    </div>
    <div class="card-body">
        <div class="row">
            <div class="col-md-8">
                <div id="geofenceMap" style="height: 500px; border-radius: 10px;"></div>
            </div>
            <div class="col-md-4">
                <div class="card mb-3">
                    <div class="card-header">
                        <h6 class="mb-0">Create New Geofence</h6>
                    </div>
                    <div class="card-body">
                        <form id="geofenceForm">
                            <div class="mb-3">
                                <label class="form-label">Name</label>
                                <input type="text" class="form-control" id="geofenceName" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Description</label>
                                <textarea class="form-control" id="geofenceDescription" rows="2"></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Selected Area Points</label>
                                <div id="coordinatesList" class="list-group small"></div>
                            </div>
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-primary">
                                    <i class="fas fa-save me-2"></i>Save Geofence
                                </button>
                                <button type="button" class="btn btn-secondary" id="resetDrawing">
                                    <i class="fas fa-undo me-2"></i>Reset Drawing
                                </button>
                            </div>
                        </form>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header d-flex justify-content-between align-items-center">
                        <h6 class="mb-0">Existing Geofences</h6>
                        <button class="btn btn-sm btn-outline-primary" id="refreshGeofences">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div class="list-group list-group-flush" id="geofenceList">
                        <!-- Geofences will be listed here -->
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>

const endDate = urlParams.get('end_date');

    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    const markerGroup = L.featureGroup().addTo(map);

async function fetchGeofenceData() {

    // === ALL DEVICES ===
    if (!imei) {
        const res = await fetch('/solar-tracker/devices');
        const { devices } = await res.json();

        const allData = [];

        await Promise.all(devices.map(async d => {
            const r = await fetch(`/solar-tracker/${d.imei}/latest`);
            const j = await r.json();
            if (j.data) allData.push(j.data);
        }));

        return allData;
    }

    // === IMEI SAJA / HISTORI ===
    let url = `/solar-tracker/data?imei=${imei}`;
    if (startDate && endDate) {
        url += `&start_date=${startDate}&end_date=${endDate}`;
    }

    const res = await fetch(url);
    const json = await res.json();
    return json.data || [];
}

function getMarkerColor(item, latestTimestamp, mode) {
    if (item.alarm?.toLowerCase().includes('door open')) return 'red';

    if (mode === 'imei-only' && item.timestamp === latestTimestamp)
        return 'green';

    return 'blue';
}

    }
});

let displayData = data;

if (!imei) {

}

displayData.forEach(item => {

    if (!imeiKey) return;

    const alarmStr = (item.alarm || '').toLowerCase();
    const isDoorOpen = alarmStr.includes('door open');

    const triangleIcon = L.divIcon({
