name: Auto Deploy to VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            cd /home/ipul/LLM/new_dashboard_solar
            git pull origin main

            # Build Docker image terbaru
            docker build -t new_dashboard_solar:latest .

            # Cek apakah container sudah ada
            if [ $(docker ps -a -q -f name=new_dashboard_solar-container) ]; then
              echo "Container sudah ada, cukup restart"
              docker stop new_dashboard_solar-container
              docker rm new_dashboard_solar-container
              docker run -d -p 5028:5028 --name new_dashboard_solar-container new_dashboard_solar:latest
            else
              echo "Container belum ada, buat baru"
              docker run -d -p 5028:5028 --name new_dashboard_solar-container new_dashboard_solar:latest
            fi